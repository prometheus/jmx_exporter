includeObjectNames: ["io.prometheus.jmx:type=customValue"]
metricCustomizers:
  - mbeanFilter:
      domain: io.prometheus.jmx
      properties:
        type: customValue
    attributesAsLabels:
      - Text
httpServer:
  authentication:
    basic:
      username: Prometheus
      password: secret
rules:
  - pattern: ".*"
