hostPort: application:9999
ssl:
  enabled: true
  protocols:
    - TLSv1.2
  ciphers:
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
  keyStore:
    type: PKCS12
    filename: application.pkcs12
    password: changeit
  trustStore:
    type: PKCS12
    filename: application.pkcs12
    password: changeit
username: ${USERNAME}
password: ${PASSWORD}
rules:
  - pattern: ".*"
